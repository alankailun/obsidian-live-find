name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          cat > release-notes.md <<EOF
          Live Find $TAG

          - Uses TanStack Virtual for dynamically measured result-list virtualization.
          - Refreshes rendered highlights through a shared rAF + 120ms scheduler and DOM mutation observer.
          - Removes obsolete result-list code and reuses cached hidden Markdown spans.
          EOF
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --notes-file release-notes.md
            gh release upload "$TAG" main.js manifest.json styles.css versions.json \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$TAG" main.js manifest.json styles.css versions.json \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --notes-file release-notes.md
          fi
