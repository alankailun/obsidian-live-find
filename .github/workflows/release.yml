name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          cat > release-notes.md <<EOF
          Live Find $TAG

          - Smarter whole-word matching for mixed English, Unicode, and CJK text.
          - Remembered find options across sessions.
          - Heading-grouped result lists with sticky group headers.
          - Scoped match counts in active heading groups.
          EOF
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --notes-file release-notes.md
            gh release upload "$TAG" main.js manifest.json styles.css versions.json \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$TAG" main.js manifest.json styles.css versions.json \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --notes-file release-notes.md
          fi
