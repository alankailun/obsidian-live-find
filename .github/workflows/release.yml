name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          cat > release-notes.md <<EOF
          Live Find $TAG

          - Source split into maintainable modules and bundled for Obsidian.
          - More stable pasted-search jumps.
          - Live Preview / Reading searches skip hidden Markdown syntax targets.
          - Smarter whole-word matching for mixed English, Unicode, and CJK text.
          - Remembered find options across sessions.
          - Heading-grouped result lists with sticky group headers.
          EOF
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --notes-file release-notes.md
            gh release upload "$TAG" main.js manifest.json styles.css versions.json \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$TAG" main.js manifest.json styles.css versions.json \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --notes-file release-notes.md
          fi
